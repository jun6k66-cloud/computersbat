<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MITCRAFT 3D Workspace</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Three.js Library & Renderers -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS3DRenderer.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;800&display=swap');
        
        * {
            box-sizing: border-box;
            font-family: 'Pretendard', sans-serif;
            user-select: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0d10;
            color: #ffffff;
        }

        #container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #css3d-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        #css3d-container iframe,
        #css3d-container .screen-interactive {
            pointer-events: auto;
        }

        .glass-panel {
            background: rgba(14, 18, 28, 0.85);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 30px 0 rgba(0, 0, 0, 0.5);
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        .iframe-container {
            width: 1280px;
            height: 720px;
            background: #080a0f;
            border-radius: 6px;
            overflow: hidden;
            position: relative;
        }

        .iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #0d1117;
        }
    </style>
</head>
<body>
    
    <div id="container"></div>
    <div id="css3d-container"></div>

    <!-- Floating Controls & Virtual Keyboard Toggle -->
    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 z-20 flex flex-col items-center gap-3 pointer-events-auto">
        
        <!-- Virtual Keyboard Drawer -->
        <div id="virtualKeyboard" class="hidden glass-panel p-3 rounded-2xl shadow-2xl border border-white/15 max-w-xl w-full">
            <div class="flex items-center justify-between pb-2 mb-2 border-b border-white/10 text-xs text-gray-300 font-medium px-1">
                <span><i class="fa-solid fa-keyboard text-blue-400 mr-1.5"></i> 가상 키보드 (마인크래프트/웹게임 조작용)</span>
                <span class="text-gray-500">버튼 클릭 시 입력 전달</span>
            </div>
            <div id="kbKeys"></div>
        </div>

        <!-- Main Toolbar -->
        <div class="glass-panel px-5 py-2.5 rounded-2xl flex items-center gap-5 shadow-2xl">
            <!-- View Presets -->
            <div class="flex items-center gap-2 text-xs text-gray-400 pr-4 border-r border-gray-700/50">
                <span class="font-medium mr-1">시점:</span>
                <button data-view="default" class="btn-view active bg-blue-600 text-white px-3 py-1.5 rounded-xl transition font-medium shadow-md shadow-blue-600/30">데스크전체</button>
                <button data-view="screen" class="btn-view bg-transparent hover:bg-gray-800/60 text-gray-400 hover:text-gray-200 px-3 py-1.5 rounded-xl transition font-medium">화면집중</button>
                <button data-view="pc" class="btn-view bg-transparent hover:bg-gray-800/60 text-gray-400 hover:text-gray-200 px-3 py-1.5 rounded-xl transition font-medium">PC본체</button>
            </div>

            <!-- RGB Lighting Theme Selector -->
            <div class="flex items-center gap-2.5 pr-4 border-r border-gray-700/50">
                <span class="text-xs text-gray-400 font-medium mr-1">조명:</span>
                <button data-theme="cyber" class="w-5 h-5 rounded-full bg-gradient-to-tr from-pink-500 to-cyan-400 ring-2 ring-white/20 hover:scale-110 transition shadow-md"></button>
                <button data-theme="neon" class="w-5 h-5 rounded-full bg-gradient-to-tr from-purple-600 to-blue-500 ring-2 ring-white/20 hover:scale-110 transition shadow-md"></button>
                <button data-theme="warm" class="w-5 h-5 rounded-full bg-gradient-to-tr from-amber-500 to-orange-400 ring-2 ring-white/20 hover:scale-110 transition shadow-md"></button>
                <button data-theme="dark" class="w-5 h-5 rounded-full bg-gradient-to-tr from-slate-700 to-slate-900 ring-2 ring-white/20 hover:scale-110 transition shadow-md"></button>
            </div>

            <!-- Pointer Lock & Screen Controls -->
            <div class="flex items-center gap-2">
                <button id="btnLockPointer" class="glass-panel px-3 py-1.5 rounded-xl text-amber-300 hover:text-amber-100 border border-amber-500/30 hover:border-amber-500/80 text-xs font-semibold transition flex items-center gap-1.5 shadow-md shadow-amber-500/10">
                    <i class="fa-solid fa-crosshairs text-amber-400"></i>
                    <span>마우스 고정(회전)</span>
                </button>
                <button id="btnFocusIframe" class="glass-panel px-3 py-1.5 rounded-xl text-emerald-300 hover:text-emerald-100 border border-emerald-500/30 hover:border-emerald-500/80 text-xs font-semibold transition flex items-center gap-1.5 shadow-md shadow-emerald-500/10">
                    <i class="fa-solid fa-keyboard text-emerald-400"></i>
                    <span>키보드 포커스 강제연결</span>
                </button>
                <button id="btnToggleKeyboard" class="glass-panel px-3 py-1.5 rounded-xl text-gray-300 hover:text-white text-xs font-medium transition flex items-center gap-1.5 hover:border-blue-500/50">
                    <i class="fa-solid fa-keyboard text-purple-400"></i>
                    <span>가상 키보드</span>
                </button>
                <button id="btnToggleInteract" class="glass-panel px-3 py-1.5 rounded-xl text-gray-200 hover:text-white text-xs font-medium transition flex items-center gap-2 hover:border-blue-500/50">
                    <i class="fa-solid fa-computer-mouse text-blue-400"></i>
                    <span id="interactStatus">화면조작</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-6 right-6 z-30 glass-panel px-4 py-2.5 rounded-xl text-xs text-white opacity-0 transition-all duration-300 transform translate-y-[-10px] pointer-events-none flex items-center gap-2">
        <i class="fa-solid fa-circle-check text-blue-400"></i>
        <span id="toastMsg">메시지</span>
    </div>

    <!-- Fullscreen Typing Practice Overlay -->
    <div id="typingModal" class="fixed inset-0 z-50 hidden bg-slate-950/95 backdrop-blur-2xl flex flex-col justify-between p-6 md:p-10 text-white select-none transition-all duration-300">
        <!-- Top Bar -->
        <div class="flex items-center justify-between max-w-4xl w-full mx-auto pb-4 border-b border-slate-800">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-blue-600/20 border border-blue-500/40 flex items-center justify-center text-blue-400 font-bold text-lg">
                    <i class="fa-solid fa-keyboard"></i>
                </div>
                <div>
                    <h2 class="text-xl font-extrabold text-white tracking-wide">타자 연습 (Typing Practice)</h2>
                    <p class="text-xs text-slate-400">L-Shift + Enter 를 누르면 복귀합니다.</p>
                </div>
            </div>
            
            <div class="flex items-center gap-3">
                <span class="px-3 py-1.5 rounded-lg bg-blue-500/10 border border-blue-500/30 text-blue-300 text-xs font-semibold flex items-center gap-1.5">
                    <kbd class="px-1.5 py-0.5 bg-slate-800 border border-slate-700 rounded text-[10px]">Left Shift</kbd> + <kbd class="px-1.5 py-0.5 bg-slate-800 border border-slate-700 rounded text-[10px]">Enter</kbd> 토글
                </span>
                <button id="btnCloseTyping" class="w-9 h-9 rounded-xl bg-slate-800 hover:bg-slate-700 text-slate-300 hover:text-white transition flex items-center justify-center text-sm">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
        </div>

        <!-- Main Typing Area -->
        <div class="max-w-3xl w-full mx-auto my-auto py-8 flex flex-col items-center">
            <!-- Language / Mode Selector -->
            <div class="flex gap-2 mb-8 bg-slate-900/80 p-1.5 rounded-xl border border-slate-800">
                <button id="btnLangKr" class="px-4 py-2 rounded-lg text-xs font-bold transition bg-blue-600 text-white shadow-lg shadow-blue-600/30">한글 문장</button>
                <button id="btnLangEn" class="px-4 py-2 rounded-lg text-xs font-bold transition text-slate-400 hover:text-white hover:bg-slate-800">English Sentence</button>
            </div>

            <!-- Target Text Card -->
            <div class="w-full bg-slate-900/90 rounded-2xl p-6 border border-slate-800/80 shadow-2xl mb-6 relative overflow-hidden">
                <div class="text-xs text-slate-400 mb-2 font-mono flex justify-between">
                    <span>원문 문장</span>
                    <span id="typingProgress" class="text-blue-400 font-semibold">1 / 10</span>
                </div>
                <div id="targetDisplay" class="text-xl md:text-2xl font-medium tracking-wide leading-relaxed min-h-[70px] flex flex-wrap items-center text-slate-400 font-mono">
                </div>
            </div>

            <!-- Typing Input Field -->
            <div class="w-full relative mb-8">
                <input type="text" id="typingInput" autocomplete="off" spellcheck="false" placeholder="위 문장을 그대로 따라 입력하세요..." 
                       class="w-full px-6 py-4 bg-slate-900 border-2 border-blue-500/50 focus:border-blue-500 rounded-2xl text-lg md:text-xl text-white outline-none shadow-xl transition-all font-mono" />
                <button id="btnNextSentence" class="absolute right-3 top-1/2 -translate-y-1/2 px-4 py-2 bg-slate-800 hover:bg-slate-700 text-xs font-semibold text-slate-300 rounded-xl transition border border-slate-700 flex items-center gap-1.5">
                    <span>다음</span>
                    <i class="fa-solid fa-arrow-right text-[10px]"></i>
                </button>
            </div>

            <!-- Realtime Stats Dashboard -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 w-full">
                <div class="bg-slate-900/80 p-4 rounded-xl border border-slate-800/80 text-center">
                    <div class="text-[11px] text-slate-400 uppercase tracking-wider font-semibold mb-1">현재 타수 (CPM)</div>
                    <div id="statCPM" class="text-2xl font-extrabold text-blue-400">0</div>
                </div>
                <div class="bg-slate-900/80 p-4 rounded-xl border border-slate-800/80 text-center">
                    <div class="text-[11px] text-slate-400 uppercase tracking-wider font-semibold mb-1">정확도 (Accuracy)</div>
                    <div id="statAccuracy" class="text-2xl font-extrabold text-emerald-400">100%</div>
                </div>
                <div class="bg-slate-900/80 p-4 rounded-xl border border-slate-800/80 text-center">
                    <div class="text-[11px] text-slate-400 uppercase tracking-wider font-semibold mb-1">최고 타수</div>
                    <div id="statMaxCPM" class="text-2xl font-extrabold text-purple-400">0</div>
                </div>
                <div class="bg-slate-900/80 p-4 rounded-xl border border-slate-800/80 text-center">
                    <div class="text-[11px] text-slate-400 uppercase tracking-wider font-semibold mb-1">완료 문장</div>
                    <div id="statCompleted" class="text-2xl font-extrabold text-amber-400">0</div>
                </div>
            </div>
        </div>

        <!-- Footer Notice -->
        <div class="text-center text-xs text-slate-500 pt-4 border-t border-slate-800/50">
            💡 단축키 <span class="text-slate-300 font-semibold">Left Shift + Enter</span>를 누르면 타자 연습 창을 닫고 3D 화면으로 돌아갑니다.
        </div>
    </div>

    <script>
        let scene, cssScene, camera, webglRenderer, cssRenderer, controls;
        let cssObject;
        let rgbLight, pcGlowLight, ambientLight;
        let fanGroups = [];
        let isInteractMode = false;
        
        // Typing Practice State
        let isLeftShiftPressed = false;
        let isTypingPracticeActive = false;
        let currentLang = 'kr';
        let sentenceIndex = 0;
        let startTime = null;
        let completedSentencesCount = 0;
        let maxCPM = 0;

        const sentencesKR = [
            "동해 물과 백두산이 마르고 닳도록 하느님이 보우하사 우리나라 만세",
            "마인크래프트 3D 워크스페이스에 오신 것을 환영합니다",
            "꿈을 계속 간직하고 있으면 언젠가 반드시 실현할 때가 온다",
            "지금 공부하지 않으면 나중에 더 많은 고생을 하게 된다",
            "성공은 거절을 당하지 않고 승리하는 것이 아니라 실패에 굴하지 않는 것이다",
            "하늘은 스스로 돕는 자를 돕는 법이다",
            "시작이 반이다 첫 걸음을 내딛는 순간 이미 변화는 시작되었다",
            "코딩은 단순한 기술이 아니라 생각을 현실로 만드는 도구이다",
            "마인크래프트 세계에서 당신만의 무언가를 구축해 보세요"
        ];

        const sentencesEN = [
            "The quick brown fox jumps over the lazy dog.",
            "Welcome to the 3D Minecraft Web Browser Experience.",
            "Stay hungry, stay foolish and keep pushing your limits.",
            "JavaScript is a versatile programming language for web developers.",
            "Practice makes perfect in every skills you want to master.",
            "Consistency and continuous effort lead to remarkable success.",
            "Never stop learning because life never stops teaching."
        ];

        const cameraPresets = {
            default: { pos: new THREE.Vector3(0, 0.9, 2.3), target: new THREE.Vector3(0, 0.45, 0) },
            screen: { pos: new THREE.Vector3(0, 0.45, 1.45), target: new THREE.Vector3(0, 0.45, 0) },
            pc: { pos: new THREE.Vector3(1.2, 0.65, 1.4), target: new THREE.Vector3(1.3, 0.45, 0) }
        };

        let targetCamPos = cameraPresets.default.pos.clone();
        let targetCamLookAt = cameraPresets.default.target.clone();

        window.onload = function () {
            initScene();
            createDeskEnvironment();
            createMonitorAndScreen();
            createPCTower();
            createAccessories();
            setupLighting();
            setupUIEventListeners();
            setupVirtualKeyboard();
            setupTypingPracticeEngine();
            setupShortcutListeners();
            setupGlobalKeyForwarding();
            
            animate();
        };

        function initScene() {
            const container = document.getElementById('container');
            const cssContainer = document.getElementById('css3d-container');

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0b0d10);
            scene.fog = new THREE.FogExp2(0x0b0d10, 0.12);

            cssScene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.copy(cameraPresets.default.pos);

            webglRenderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            webglRenderer.setSize(window.innerWidth, window.innerHeight);
            webglRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            webglRenderer.shadowMap.enabled = true;
            webglRenderer.shadowMap.type = THREE.PCFSoftShadowMap;
            webglRenderer.toneMapping = THREE.ACESFilmicToneMapping;
            webglRenderer.toneMappingExposure = 1.1;
            container.appendChild(webglRenderer.domElement);

            cssRenderer = new THREE.CSS3DRenderer();
            cssRenderer.setSize(window.innerWidth, window.innerHeight);
            cssContainer.appendChild(cssRenderer.domElement);

            controls = new THREE.OrbitControls(camera, webglRenderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 + 0.02;
            controls.minDistance = 0.6;
            controls.maxDistance = 6.0;
            controls.target.copy(cameraPresets.default.target);

            window.addEventListener('resize', onWindowResize);
        }

        function createDeskEnvironment() {
            const deskMat = new THREE.MeshStandardMaterial({
                color: 0x161920,
                roughness: 0.5,
                metalness: 0.1
            });
            const desk = new THREE.Mesh(new THREE.BoxGeometry(4.8, 0.1, 2.2), deskMat);
            desk.position.set(0, -0.05, 0);
            desk.receiveShadow = true;
            scene.add(desk);

            const mousepadMat = new THREE.MeshStandardMaterial({ color: 0x111318, roughness: 0.9 });
            const mousepad = new THREE.Mesh(new THREE.BoxGeometry(2.8, 0.01, 1.0), mousepadMat);
            mousepad.position.set(0, 0.005, 0.2);
            mousepad.receiveShadow = true;
            scene.add(mousepad);

            const wallMat = new THREE.MeshStandardMaterial({ color: 0x0c0f14, roughness: 0.9 });
            const wall = new THREE.Mesh(new THREE.PlaneGeometry(12, 8), wallMat);
            wall.position.set(0, 3, -1.1);
            wall.receiveShadow = true;
            scene.add(wall);
        }

        function createMonitorAndScreen() {
            const monitorGroup = new THREE.Group();

            const frameWidth = 2.2;
            const frameHeight = 1.25;
            const frameDepth = 0.08;

            const frameMat = new THREE.MeshStandardMaterial({
                color: 0x15171d,
                metalness: 0.8,
                roughness: 0.2
            });
            const frame = new THREE.Mesh(new THREE.BoxGeometry(frameWidth, frameHeight, frameDepth), frameMat);
            frame.position.set(0, 0.65, 0);
            frame.castShadow = true;
            frame.receiveShadow = true;
            monitorGroup.add(frame);

            const standMat = new THREE.MeshStandardMaterial({ color: 0x1e222b, metalness: 0.9, roughness: 0.2 });
            const standArm = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.05, 0.6, 16), standMat);
            standArm.position.set(0, 0.28, -0.15);
            standArm.rotation.x = -0.1;
            monitorGroup.add(standArm);

            const standBase = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.02, 0.4), standMat);
            standBase.position.set(0, 0.01, -0.05);
            monitorGroup.add(standBase);

            scene.add(monitorGroup);

            // Create home browser launcher inside monitor screen
            const iframeElementWrapper = document.createElement('div');
            iframeElementWrapper.className = 'iframe-container screen-interactive';
            
            const initialScreenHTML = 
                '<div style="width:100%; height:100%; background:#090d16; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#fff; font-family:\'Pretendard\', sans-serif; padding:30px;">' +
                    '<div style="background:rgba(22, 27, 38, 0.92); padding:36px; border-radius:20px; border:1px solid rgba(255,255,255,0.12); width:680px; box-shadow:0 25px 50px rgba(0,0,0,0.7); text-align:center;">' +
                        '<div style="width:56px; height:56px; background:linear-gradient(135deg, #2563eb, #3b82f6); border-radius:16px; margin:0 auto 16px; display:flex; align-items:center; justify-content:center; font-size:24px; color:#fff; box-shadow:0 10px 25px rgba(37,99,235,0.4);">' +
                            '<i class="fa-solid fa-gamepad"></i>' +
                        '</div>' +
                        '<h2 style="font-size:24px; font-weight:800; margin-bottom:6px; letter-spacing:-0.5px;">MITCRAFT 게임 포털</h2>' +
                        '<p style="font-size:13px; color:#9ca3af; margin-bottom:26px;">원하는 바로가기 카드를 클릭하면 포인터 잠금 및 키보드 입력 허용 iframe으로 전환됩니다</p>' +
                        
                        '<!-- Preset Bookmark Grid -->' +
                        '<div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:14px; margin-bottom:24px;">' +
                            '<button class="preset-card" data-url="https://mitcraft.kro.kr" style="background:#111622; border:1px solid rgba(255,255,255,0.1); border-radius:14px; padding:18px 12px; cursor:pointer; transition:all 0.2s; display:flex; flex-direction:column; align-items:center; gap:10px; color:#fff;" onmouseover="this.style.borderColor=\'#3b82f6\'; this.style.transform=\'translateY(-3px)\'; this.style.background=\'#1a2234\';" onmouseout="this.style.borderColor=\'rgba(255,255,255,0.1)\'; this.style.transform=\'none\'; this.style.background=\'#111622\';">' +
                                '<div style="width:42px; height:42px; border-radius:12px; background:rgba(59,130,246,0.15); color:#60a5fa; display:flex; align-items:center; justify-content:center; font-size:20px;">' +
                                    '<i class="fa-solid fa-cube"></i>' +
                                '</div>' +
                                '<div>' +
                                    '<div style="font-size:14px; font-weight:700; margin-bottom:3px;">이글러크래프트</div>' +
                                    '<div style="font-size:11px; color:#6b7280;">mitcraft.kro.kr</div>' +
                                '</div>' +
                            '</button>' +
                            
                            '<button class="preset-card" data-url="https://jun6k66-cloud.github.io/fakeos/" style="background:#111622; border:1px solid rgba(255,255,255,0.1); border-radius:14px; padding:18px 12px; cursor:pointer; transition:all 0.2s; display:flex; flex-direction:column; align-items:center; gap:10px; color:#fff;" onmouseover="this.style.borderColor=\'#a855f7\'; this.style.transform=\'translateY(-3px)\'; this.style.background=\'#1a2234\';" onmouseout="this.style.borderColor=\'rgba(255,255,255,0.1)\'; this.style.transform=\'none\'; this.style.background=\'#111622\';">' +
                                '<div style="width:42px; height:42px; border-radius:12px; background:rgba(168,85,247,0.15); color:#c084fc; display:flex; align-items:center; justify-content:center; font-size:20px;">' +
                                    '<i class="fa-solid fa-headset"></i>' +
                                '</div>' +
                                '<div>' +
                                    '<div style="font-size:14px; font-weight:700; margin-bottom:3px;">바탕화면으로 돌아가기</div>' +
                                    '<div style="font-size:11px; color:#6b7280;">suyugame.kro.kr</div>' +

        // Parent Window -> Iframe Global Key Dispatcher
        function setupGlobalKeyForwarding() {
            window.addEventListener('keydown', (e) => {
                if (!isInteractMode || isTypingPracticeActive) return;

                // Ignore UI Input Elements
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

                // Prevent key scroll default behaviors for game controls
                if (['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Tab'].includes(e.code)) {
                    e.preventDefault();
                }

                forwardKeyEvent('keydown', e);
            });

            window.addEventListener('keyup', (e) => {
                if (!isInteractMode || isTypingPracticeActive) return;
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

                forwardKeyEvent('keyup', e);
            });
        }

        function forwardKeyEvent(eventType, originalEvent) {
            try {
                const iframe = document.getElementById('browserIframe');
                if (iframe && iframe.contentWindow) {
                    // Try direct event dispatch if same-origin allowed
                    try {
                        const evt = new KeyboardEvent(eventType, {
                            key: originalEvent.key,
                            code: originalEvent.code,
                            keyCode: originalEvent.keyCode,
                            which: originalEvent.which,
                            bubbles: true,
                            cancelable: true
                        });
                        iframe.contentWindow.dispatchEvent(evt);
                        if (iframe.contentDocument) {
                            iframe.contentDocument.dispatchEvent(evt);
                            const activeEl = iframe.contentDocument.activeElement || iframe.contentDocument.body;
                            if (activeEl) activeEl.dispatchEvent(evt);
                        }
                    } catch(err) {
                        // Cross-origin fallback via postMessage
                        iframe.contentWindow.postMessage({
                            type: 'KEYBOARD_EVENT',
                            eventType: eventType,
                            key: originalEvent.key,
                            code: originalEvent.code,
                            keyCode: originalEvent.keyCode
                        }, '*');
                    }
                }
            } catch(e) {}
        }

        function loadSentence() {
            const sentences = currentLang === 'kr' ? sentencesKR : sentencesEN;
            const targetText = sentences[sentenceIndex % sentences.length];
            const typingInput = document.getElementById('typingInput');
            const progressSpan = document.getElementById('typingProgress');

            progressSpan.textContent = ((sentenceIndex % sentences.length) + 1) + " / " + sentences.length;
            typingInput.value = '';
            startTime = null;

            updateDisplayHighlight(targetText, '');
            document.getElementById('statCPM').textContent = '0';
            document.getElementById('statAccuracy').textContent = '100%';
        }

        function handleTypingInput() {
            const sentences = currentLang === 'kr' ? sentencesKR : sentencesEN;
            const targetText = sentences[sentenceIndex % sentences.length];
            const typingInput = document.getElementById('typingInput');
            const inputText = typingInput.value;

            if (!startTime && inputText.length > 0) {
                startTime = new Date();
            }

            updateDisplayHighlight(targetText, inputText);

            if (startTime && inputText.length > 0) {
                const now = new Date();
                const timeDiffSeconds = Math.max((now - startTime) / 1000, 0.5);
                const cpm = Math.round((inputText.length / timeDiffSeconds) * 60);
                
                document.getElementById('statCPM').textContent = cpm;
                if (cpm > maxCPM) {
                    maxCPM = cpm;
                    document.getElementById('statMaxCPM').textContent = maxCPM;
                }

                let correctChars = 0;
                for (let i = 0; i < inputText.length; i++) {
                    if (i < targetText.length && inputText[i] === targetText[i]) {
                        correctChars++;
                    }
                }
                const accuracy = Math.round((correctChars / inputText.length) * 100);
                document.getElementById('statAccuracy').textContent = accuracy + "%";

                if (inputText === targetText) {
                    completedSentencesCount++;
                    document.getElementById('statCompleted').textContent = completedSentencesCount;
                    setTimeout(() => {
                        nextSentence();
                    }, 300);
                }
            }
        }

        function updateDisplayHighlight(targetText, inputText) {
            const targetDisplay = document.getElementById('targetDisplay');
            targetDisplay.innerHTML = '';

            for (let i = 0; i < targetText.length; i++) {
                const charSpan = document.createElement('span');
                charSpan.textContent = targetText[i] === ' ' ? ' ' : targetText[i];
                if (targetText[i] === ' ') {
                    charSpan.style.display = 'inline-block';
                    charSpan.style.width = '0.4em';
                }

                if (i < inputText.length) {
                    if (inputText[i] === targetText[i]) {
                        charSpan.className = 'text-emerald-400 font-bold border-b-2 border-emerald-400';
                    } else {
                        charSpan.className = 'text-rose-500 font-bold bg-rose-500/20 border-b-2 border-rose-500 rounded-sm';
                    }
                } else if (i === inputText.length) {
                    charSpan.className = 'text-blue-400 bg-blue-500/20 border-b-2 border-blue-400 animate-pulse font-bold';
                } else {
                    charSpan.className = 'text-slate-400';
                }

                targetDisplay.appendChild(charSpan);
            }
        }

                cssContainer.style.pointerEvents = "auto";
                controls.enabled = false;
                showToast("화면 조작 및 키보드 입력 활성화");
                focusGameScreen();
            } else {
                statusText.textContent = "화면조작";
                cssContainer.style.pointerEvents = "none";
                controls.enabled = true;
                showToast("카메라 회전 모드");
            }
        }

        function applyRGBTheme(theme) {
            switch(theme) {
                case 'cyber':
                    rgbLight.color.setHex(0xff007f);
                    pcGlowLight.color.setHex(0x00f0ff);
                    showToast("테마: 핑크 & 시안");
                    break;
                case 'neon':
                    rgbLight.color.setHex(0x8b5cf6);
                    pcGlowLight.color.setHex(0x3b82f6);
                    showToast("테마: 네온 퍼플");
                    break;
                case 'warm':
                    rgbLight.color.setHex(0xf59e0b);
                    pcGlowLight.color.setHex(0xd97706);
                    showToast("테마: 웜 선셋");
                    break;
                case 'dark':
                    rgbLight.color.setHex(0x1e293b);
                    pcGlowLight.color.setHex(0x334155);
                    showToast("테마: 미니멀 다크");
                    break;
            }
            if (isInteractMode) {
                focusGameScreen();
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').textContent = msg;
            toast.classList.remove('opacity-0', 'translate-y-[-10px]');
            toast.classList.add('opacity-100', 'translate-y-0');

            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', 'translate-y-[-10px]');
            }, 2500);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            webglRenderer.setSize(window.innerWidth, window.innerHeight);
            cssRenderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (isTypingPracticeActive) return;

            camera.position.lerp(targetCamPos, 0.05);
            controls.target.lerp(targetCamLookAt, 0.05);
            controls.update();

            const time = performance.now() * 0.005;
            fanGroups.forEach((fan) => {
                fan.rotation.z = time;
            });

            webglRenderer.render(scene, camera);
            cssRenderer.render(cssScene, camera);
        }
    </script>
</body>
</html>
