<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WORKSPACE</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Three.js Library & Renderers -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS3DRenderer.js"></script>
    
    <!-- Custom CSS Styles -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;800&display=swap');
        
        * {
            box-sizing: border-box;
            font-family: 'Pretendard', sans-serif;
            user-select: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0d10;
            color: #ffffff;
        }

        #container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #css3d-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        #css3d-container iframe,
        #css3d-container .screen-interactive {
            pointer-events: auto;
        }

        .glass-panel {
            background: rgba(14, 18, 28, 0.85);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 30px 0 rgba(0, 0, 0, 0.5);
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        .iframe-container {
            width: 1280px;
            height: 720px;
            background: #080a0f;
            border-radius: 6px;
            overflow: hidden;
            position: relative;
        }

        .iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #0d1117;
        }
    </style>
</head>
<body>
    
    <div id="container"></div>
    <div id="css3d-container"></div>

    <!-- Minimal Floating Bottom Center Controls (As requested in reference image) -->
    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 z-20 glass-panel px-5 py-2.5 rounded-2xl flex items-center gap-5 shadow-2xl pointer-events-auto">
        <!-- View Presets -->
        <div class="flex items-center gap-2 text-xs text-gray-400 pr-4 border-r border-gray-700/50">
            <span class="font-medium mr-1">시점:</span>
            <button data-view="default" class="btn-view active bg-blue-600 text-white px-3 py-1.5 rounded-xl transition font-medium shadow-md shadow-blue-600/30">데스크전체</button>
            <button data-view="screen" class="btn-view bg-transparent hover:bg-gray-800/60 text-gray-400 hover:text-gray-200 px-3 py-1.5 rounded-xl transition font-medium">화면집중</button>
            <button data-view="pc" class="btn-view bg-transparent hover:bg-gray-800/60 text-gray-400 hover:text-gray-200 px-3 py-1.5 rounded-xl transition font-medium">PC본체</button>
        </div>

        <!-- RGB Lighting Theme Selector -->
        <div class="flex items-center gap-2.5 pr-4 border-r border-gray-700/50">
            <span class="text-xs text-gray-400 font-medium mr-1">조명:</span>
            <button data-theme="cyber" class="w-5 h-5 rounded-full bg-gradient-to-tr from-pink-500 to-cyan-400 ring-2 ring-white/20 hover:scale-110 transition shadow-md"></button>
            <button data-theme="neon" class="w-5 h-5 rounded-full bg-gradient-to-tr from-purple-600 to-blue-500 ring-2 ring-white/20 hover:scale-110 transition shadow-md"></button>
            <button data-theme="warm" class="w-5 h-5 rounded-full bg-gradient-to-tr from-amber-500 to-orange-400 ring-2 ring-white/20 hover:scale-110 transition shadow-md"></button>
            <button data-theme="dark" class="w-5 h-5 rounded-full bg-gradient-to-tr from-slate-700 to-slate-900 ring-2 ring-white/20 hover:scale-110 transition shadow-md"></button>
        </div>

        <!-- Toggle Screen Interact / Camera Orbit -->
        <button id="btnToggleInteract" class="glass-panel px-3 py-1.5 rounded-xl text-gray-200 hover:text-white text-xs font-medium transition flex items-center gap-2 hover:border-blue-500/50">
            <i class="fa-solid fa-computer-mouse text-blue-400"></i>
            <span id="interactStatus">화면조작</span>
        </button>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-6 right-6 z-30 glass-panel px-4 py-2.5 rounded-xl text-xs text-white opacity-0 transition-all duration-300 transform translate-y-[-10px] pointer-events-none flex items-center gap-2">
        <i class="fa-solid fa-circle-check text-blue-400"></i>
        <span id="toastMsg">메시지</span>
    </div>

    <!-- JavaScript Logic -->
    <script>
        let scene, cssScene, camera, webglRenderer, cssRenderer, controls;
        let cssObject;
        let rgbLight, pcGlowLight, ambientLight;
        let fanGroups = [];
        let isInteractMode = false;

        // Updated initial zoom: closer camera position and tighter target
        const cameraPresets = {
            default: { pos: new THREE.Vector3(0, 0.9, 2.3), target: new THREE.Vector3(0, 0.45, 0) },
            screen: { pos: new THREE.Vector3(0, 0.45, 1.45), target: new THREE.Vector3(0, 0.45, 0) },
            pc: { pos: new THREE.Vector3(1.2, 0.65, 1.4), target: new THREE.Vector3(1.3, 0.45, 0) }
        };

        let targetCamPos = cameraPresets.default.pos.clone();
        let targetCamLookAt = cameraPresets.default.target.clone();

        window.onload = function () {
            initScene();
            createDeskEnvironment();
            createMonitorAndScreen();
            createPCTower();
            createAccessories();
            setupLighting();
            setupUIEventListeners();
            setupVirtualKeyboard();
            
            animate();
        };

        function initScene() {
            const container = document.getElementById('container');
            const cssContainer = document.getElementById('css3d-container');

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0b0d10);
            scene.fog = new THREE.FogExp2(0x0b0d10, 0.12);

            cssScene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.copy(cameraPresets.default.pos);

            webglRenderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            webglRenderer.setSize(window.innerWidth, window.innerHeight);
            webglRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            webglRenderer.shadowMap.enabled = true;
            webglRenderer.shadowMap.type = THREE.PCFSoftShadowMap;
            webglRenderer.toneMapping = THREE.ACESFilmicToneMapping;
            webglRenderer.toneMappingExposure = 1.1;
            container.appendChild(webglRenderer.domElement);

            cssRenderer = new THREE.CSS3DRenderer();
            cssRenderer.setSize(window.innerWidth, window.innerHeight);
            cssContainer.appendChild(cssRenderer.domElement);

            controls = new THREE.OrbitControls(camera, webglRenderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 + 0.02;
            controls.minDistance = 0.6;
            controls.maxDistance = 6.0;
            controls.target.copy(cameraPresets.default.target);

            window.addEventListener('resize', onWindowResize);
        }

        function createDeskEnvironment() {
            const deskMat = new THREE.MeshStandardMaterial({
                color: 0x161920,
                roughness: 0.5,
                metalness: 0.1
            });
            const desk = new THREE.Mesh(new THREE.BoxGeometry(4.8, 0.1, 2.2), deskMat);
            desk.position.set(0, -0.05, 0);
            desk.receiveShadow = true;
            scene.add(desk);

            const mousepadMat = new THREE.MeshStandardMaterial({ color: 0x111318, roughness: 0.9 });
            const mousepad = new THREE.Mesh(new THREE.BoxGeometry(2.8, 0.01, 1.0), mousepadMat);
            mousepad.position.set(0, 0.005, 0.2);
            mousepad.receiveShadow = true;
            scene.add(mousepad);

            const wallMat = new THREE.MeshStandardMaterial({ color: 0x0c0f14, roughness: 0.9 });
            const wall = new THREE.Mesh(new THREE.PlaneGeometry(12, 8), wallMat);
            wall.position.set(0, 3, -1.1);
            wall.receiveShadow = true;
            scene.add(wall);
        }

        function createMonitorAndScreen() {
            const monitorGroup = new THREE.Group();

            const frameWidth = 2.2;
            const frameHeight = 1.25;
            const frameDepth = 0.08;

            const frameMat = new THREE.MeshStandardMaterial({
                color: 0x15171d,
                metalness: 0.8,
                roughness: 0.2
            });
            const frame = new THREE.Mesh(new THREE.BoxGeometry(frameWidth, frameHeight, frameDepth), frameMat);
            frame.position.set(0, 0.65, 0);
            frame.castShadow = true;
            frame.receiveShadow = true;
            monitorGroup.add(frame);

            const standMat = new THREE.MeshStandardMaterial({ color: 0x1e222b, metalness: 0.9, roughness: 0.2 });
            const standArm = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.05, 0.6, 16), standMat);
            standArm.position.set(0, 0.28, -0.15);
            standArm.rotation.x = -0.1;
            monitorGroup.add(standArm);

            const standBase = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.02, 0.4), standMat);
            standBase.position.set(0, 0.01, -0.05);
            monitorGroup.add(standBase);

            scene.add(monitorGroup);

            // Create home browser launcher inside monitor screen
            const iframeElementWrapper = document.createElement('div');
            iframeElementWrapper.className = 'iframe-container screen-interactive';
            iframeElementWrapper.innerHTML = `
                <div style="width:100%; height:100%; background:#090d16; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#fff; font-family:'Pretendard',sans-serif;">
                    <div style="background:rgba(22, 27, 38, 0.9); padding:40px; border-radius:16px; border:1px solid rgba(255,255,255,0.1); width:520px; box-shadow:0 20px 40px rgba(0,0,0,0.6); text-align:center;">
                        <div style="width:64px; height:64px; background:#2563eb; border-radius:14px; margin:0 auto 20px; display:flex; align-items:center; justify-content:center; font-size:28px; font-weight:bold; box-shadow:0 10px 20px rgba(37,99,235,0.4);">
                            M
                        </div>
                        <h2 style="font-size:22px; font-weight:700; margin-bottom:8px;">MITOUT</h2>
                        <p style="font-size:13px; color:#9ca3af; margin-bottom:24px;">접속할 웹사이트 주소를 입력하세요 (기본: https://mitcraft.kro.kr)</p>
                        
                        <div style="display:flex; gap:10px; background:#111520; padding:6px; border-radius:12px; border:1px solid rgba(255,255,255,0.15);">
                            <input type="text" id="homeUrlInput" value="https://mitcraft.kro.kr" 
                                   style="flex:1; background:transparent; border:none; color:#fff; font-size:14px; padding:8px 12px; outline:none;" />
                            <button id="homeLoadBtn" style="background:#2563eb; color:#fff; border:none; padding:10px 20px; border-radius:8px; font-weight:600; cursor:pointer; font-size:13px; transition:0.2s;">
                                접속하기
                            </button>
                        </div>
                    </div>
                </div>
            `;

            cssObject = new THREE.CSS3DObject(iframeElementWrapper);
            
            const scaleX = (frameWidth - 0.06) / 1280;
            const scaleY = (frameHeight - 0.06) / 720;
            
            cssObject.scale.set(scaleX, scaleY, 1);
            cssObject.position.set(0, 0.65, 0.043);
            
            cssScene.add(cssObject);

            setTimeout(() => {
                const btn = iframeElementWrapper.querySelector('#homeLoadBtn');
                const input = iframeElementWrapper.querySelector('#homeUrlInput');
                if (btn && input) {
                    const loadAction = () => {
                        let url = input.value.trim();
                        if(!url.startsWith('http://') && !url.startsWith('https://')) {
                            url = 'https://' + url;
                        }
                        iframeElementWrapper.innerHTML = `<iframe id="browserIframe" src="${url}" style="width:100%; height:100%; border:none;"></iframe>`;
                        showToast(url + "로 접속했습니다.");
                        setInteractMode(true);
                    };
                    btn.addEventListener('click', loadAction);
                    input.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter') loadAction();
                    });
                }
            }, 100);
        }

        function createPCTower() {
            const towerGroup = new THREE.Group();
            towerGroup.position.set(1.7, 0, -0.1);

            const caseMat = new THREE.MeshStandardMaterial({ color: 0x0f1116, metalness: 0.7, roughness: 0.3 });
            const caseBody = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.9, 0.8), caseMat);
            caseBody.position.set(0, 0.45, 0);
            caseBody.castShadow = true;
            towerGroup.add(caseBody);

            const glassMat = new THREE.MeshPhysicalMaterial({
                color: 0xffffff, transparent: true, opacity: 0.3, roughness: 0.1, transmission: 0.9
            });
            const glassPanel = new THREE.Mesh(new THREE.PlaneGeometry(0.76, 0.84), glassMat);
            glassPanel.position.set(-0.251, 0.45, 0);
            glassPanel.rotation.y = -Math.PI / 2;
            towerGroup.add(glassPanel);

            const gpuMat = new THREE.MeshStandardMaterial({ color: 0x161922, metalness: 0.8 });
            const gpu = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.1, 0.45), gpuMat);
            gpu.position.set(-0.02, 0.35, 0.05);
            towerGroup.add(gpu);

            const fanGeom = new THREE.TorusGeometry(0.09, 0.015, 8, 24);
            const fanMat = new THREE.MeshBasicMaterial({ color: 0x3b82f6 });

            for (let i = 0; i < 3; i++) {
                const fan = new THREE.Mesh(fanGeom, fanMat);
                fan.position.set(-0.23, 0.22 + i * 0.22, 0.38);
                fan.rotation.y = Math.PI / 2;
                towerGroup.add(fan);
                fanGroups.push(fan);
            }

            pcGlowLight = new THREE.PointLight(0x3b82f6, 2.5, 1.2);
            pcGlowLight.position.set(0, 0.45, 0);
            towerGroup.add(pcGlowLight);

            scene.add(towerGroup);
        }

        function createAccessories() {
            const kbBaseMat = new THREE.MeshStandardMaterial({ color: 0x15171e, metalness: 0.5, roughness: 0.4 });
            const kbBase = new THREE.Mesh(new THREE.BoxGeometry(0.85, 0.025, 0.28), kbBaseMat);
            kbBase.position.set(-0.2, 0.02, 0.35);
            kbBase.castShadow = true;
            scene.add(kbBase);

            const mouseMat = new THREE.MeshStandardMaterial({ color: 0x14161c, roughness: 0.2, metalness: 0.6 });
            const mouse = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.04, 0.2), mouseMat);
            mouse.position.set(0.7, 0.025, 0.35);
            mouse.rotation.y = -0.15;
            mouse.castShadow = true;
            scene.add(mouse);

            const speakerMat = new THREE.MeshStandardMaterial({ color: 0x12141a, roughness: 0.4 });
            const speakerGeom = new THREE.BoxGeometry(0.2, 0.4, 0.22);

            const leftSpeaker = new THREE.Mesh(speakerGeom, speakerMat);
            leftSpeaker.position.set(-1.25, 0.2, -0.1);
            leftSpeaker.rotation.y = 0.25;
            scene.add(leftSpeaker);

            const rightSpeaker = new THREE.Mesh(speakerGeom, speakerMat);
            rightSpeaker.position.set(1.25, 0.2, -0.1);
            rightSpeaker.rotation.y = -0.25;
            scene.add(rightSpeaker);
        }

        function setupLighting() {
            ambientLight = new THREE.AmbientLight(0xffffff, 0.55);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
            dirLight.position.set(3, 5, 4);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            scene.add(dirLight);

            rgbLight = new THREE.PointLight(0x3b82f6, 3.5, 3.5);
            rgbLight.position.set(0, 0.7, -0.2);
            scene.add(rgbLight);
        }

        function setupUIEventListeners() {
            const viewButtons = document.querySelectorAll('.btn-view');
            viewButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    viewButtons.forEach(b => {
                        b.classList.remove('active', 'bg-blue-600', 'text-white', 'shadow-md', 'shadow-blue-600/30');
                        b.classList.add('bg-transparent', 'text-gray-400');
                    });
                    btn.classList.add('active', 'bg-blue-600', 'text-white', 'shadow-md', 'shadow-blue-600/30');
                    btn.classList.remove('bg-transparent', 'text-gray-400');

                    const viewType = btn.getAttribute('data-view');
                    if (cameraPresets[viewType]) {
                        targetCamPos.copy(cameraPresets[viewType].pos);
                        targetCamLookAt.copy(cameraPresets[viewType].target);

                        if (viewType === 'screen') {
                            setInteractMode(true);
                        } else {
                            setInteractMode(false);
                        }
                    }
                });
            });

            const themeButtons = document.querySelectorAll('[data-theme]');
            themeButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    const theme = btn.getAttribute('data-theme');
                    applyRGBTheme(theme);
                });
            });

            const btnToggleInteract = document.getElementById('btnToggleInteract');
            btnToggleInteract.addEventListener('click', () => {
                setInteractMode(!isInteractMode);
            });

            // Virtual Keyboard Toggle
            const btnToggleKeyboard = document.getElementById('btnToggleKeyboard');
            const virtualKeyboard = document.getElementById('virtualKeyboard');
            btnToggleKeyboard.addEventListener('click', () => {
                if (virtualKeyboard.classList.contains('hidden')) {
                    virtualKeyboard.classList.remove('hidden');
                    btnToggleKeyboard.classList.add('border-blue-500', 'text-white');
                } else {
                    virtualKeyboard.classList.add('hidden');
                    btnToggleKeyboard.classList.remove('border-blue-500', 'text-white');
                }
            });
        }

        // Full Interactive Virtual Keyboard Generator
        function setupVirtualKeyboard() {
            const kbContainer = document.getElementById('kbKeys');
            if(!kbContainer) return;

            const rows = [
                [
                    { label: 'ESC', code: 'Escape', key: 'Escape' },
                    { label: '1', code: 'Digit1', key: '1' }, { label: '2', code: 'Digit2', key: '2' },
                    { label: '3', code: 'Digit3', key: '3' }, { label: '4', code: 'Digit4', key: '4' },
                    { label: '5', code: 'Digit5', key: '5' }, { label: '6', code: 'Digit6', key: '6' },
                    { label: '7', code: 'Digit7', key: '7' }, { label: '8', code: 'Digit8', key: '8' },
                    { label: '9', code: 'Digit9', key: '9' }, { label: '0', code: 'Digit0', key: '0' },
                    { label: 'BS', code: 'Backspace', key: 'Backspace', w: 'w-16' }
                ],
                [
                    { label: 'TAB', code: 'Tab', key: 'Tab', w: 'w-12' },
                    { label: 'Q', code: 'KeyQ', key: 'q' }, { label: 'W', code: 'KeyW', key: 'w' },
                    { label: 'E', code: 'KeyE', key: 'e' }, { label: 'R', code: 'KeyR', key: 'r' },
                    { label: 'T', code: 'KeyT', key: 't' }, { label: 'Y', code: 'KeyY', key: 'y' },
                    { label: 'U', code: 'KeyU', key: 'u' }, { label: 'I', code: 'KeyI', key: 'i' },
                    { label: 'O', code: 'KeyO', key: 'o' }, { label: 'P', code: 'KeyP', key: 'p' }
                ],
                [
                    { label: 'CAPS', code: 'CapsLock', key: 'CapsLock', w: 'w-14' },
                    { label: 'A', code: 'KeyA', key: 'a' }, { label: 'S', code: 'KeyS', key: 's' },
                    { label: 'D', code: 'KeyD', key: 'd' }, { label: 'F', code: 'KeyF', key: 'f' },
                    { label: 'G', code: 'KeyG', key: 'g' }, { label: 'H', code: 'KeyH', key: 'h' },
                    { label: 'J', code: 'KeyJ', key: 'j' }, { label: 'K', code: 'KeyK', key: 'k' },
                    { label: 'L', code: 'KeyL', key: 'l' },
                    { label: 'ENTER', code: 'Enter', key: 'Enter', w: 'w-16' }
                ],
                [
                    { label: 'SHIFT', code: 'ShiftLeft', key: 'Shift', w: 'w-20' },
                    { label: 'Z', code: 'KeyZ', key: 'z' }, { label: 'X', code: 'KeyX', key: 'x' },
                    { label: 'C', code: 'KeyC', key: 'c' }, { label: 'V', code: 'KeyV', key: 'v' },
                    { label: 'B', code: 'KeyB', key: 'b' }, { label: 'N', code: 'KeyN', key: 'n' },
                    { label: 'M', code: 'KeyM', key: 'm' },
                    { label: '▲', code: 'ArrowUp', key: 'ArrowUp' }
                ],
                [
                    { label: 'CTRL', code: 'ControlLeft', key: 'Control', w: 'w-14' },
                    { label: 'ALT', code: 'AltLeft', key: 'Alt', w: 'w-12' },
                    { label: 'SPACE', code: 'Space', key: ' ', w: 'w-48' },
                    { label: '◄', code: 'ArrowLeft', key: 'ArrowLeft' },
                    { label: '▼', code: 'ArrowDown', key: 'ArrowDown' },
                    { label: '►', code: 'ArrowRight', key: 'ArrowRight' }
                ]
            ];

            rows.forEach(row => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'flex justify-center gap-1.5 mb-1.5';
                row.forEach(k => {
                    const btn = document.createElement('button');
                    btn.className = `h-9 ${k.w || 'w-10'} bg-slate-800/90 hover:bg-blue-600 text-slate-200 hover:text-white rounded-lg text-xs font-semibold shadow transition flex items-center justify-center border border-white/10 active:scale-95`;
                    btn.textContent = k.label;

                    const sendKeyAction = (type) => {
                        try {
                            const iframe = document.getElementById('browserIframe');
                            if (iframe && iframe.contentWindow) {
                                iframe.contentWindow.focus();
                                const ev = new KeyboardEvent(type, {
                                    key: k.key,
                                    code: k.code,
                                    bubbles: true,
                                    cancelable: true
                                });
                                iframe.contentDocument.dispatchEvent(ev) || iframe.contentWindow.dispatchEvent(ev);
                            }
                        } catch(e) {}
                    };

                    btn.addEventListener('mousedown', (e) => {
                        e.preventDefault();
                        sendKeyAction('keydown');
                    });
                    btn.addEventListener('mouseup', (e) => {
                        e.preventDefault();
                        sendKeyAction('keyup');
                    });
                    // Support touch devices
                    btn.addEventListener('touchstart', (e) => {
                        e.preventDefault();
                        sendKeyAction('keydown');
                    });
                    btn.addEventListener('touchend', (e) => {
                        e.preventDefault();
                        sendKeyAction('keyup');
                    });

                    rowDiv.appendChild(btn);
                });
                kbContainer.appendChild(rowDiv);
            });
        }

        function focusGameScreen() {
            try {
                const iframe = document.getElementById('browserIframe');
                if (iframe && iframe.contentWindow) {
                    iframe.contentWindow.focus();
                }
            } catch(e) {}
        }

        function setInteractMode(enable) {
            isInteractMode = enable;
            const statusText = document.getElementById('interactStatus');
            const cssContainer = document.getElementById('css3d-container');

            if (isInteractMode) {
                statusText.textContent = "조작중(탈출클릭)";
                cssContainer.style.pointerEvents = "auto";
                controls.enabled = false;
                showToast("화면 조작 및 키보드 입력 활성화");
                focusGameScreen();
            } else {
                statusText.textContent = "화면조작";
                cssContainer.style.pointerEvents = "none";
                controls.enabled = true;
                showToast("카메라 회전 모드");
            }
        }

        function applyRGBTheme(theme) {
            switch(theme) {
                case 'cyber':
                    rgbLight.color.setHex(0xff007f);
                    pcGlowLight.color.setHex(0x00f0ff);
                    showToast("테마: 핑크 & 시안");
                    break;
                case 'neon':
                    rgbLight.color.setHex(0x8b5cf6);
                    pcGlowLight.color.setHex(0x3b82f6);
                    showToast("테마: 네온 퍼플");
                    break;
                case 'warm':
                    rgbLight.color.setHex(0xf59e0b);
                    pcGlowLight.color.setHex(0xd97706);
                    showToast("테마: 웜 선셋");
                    break;
                case 'dark':
                    rgbLight.color.setHex(0x1e293b);
                    pcGlowLight.color.setHex(0x334155);
                    showToast("테마: 미니멀 다크");
                    break;
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').textContent = msg;
            toast.classList.remove('opacity-0', 'translate-y-[-10px]');
            toast.classList.add('opacity-100', 'translate-y-0');

            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', 'translate-y-[-10px]');
            }, 2500);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            webglRenderer.setSize(window.innerWidth, window.innerHeight);
            cssRenderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            camera.position.lerp(targetCamPos, 0.05);
            controls.target.lerp(targetCamLookAt, 0.05);
            controls.update();

            const time = performance.now() * 0.005;
            fanGroups.forEach((fan) => {
                fan.rotation.z = time;
            });

            webglRenderer.render(scene, camera);
            cssRenderer.render(cssScene, camera);
        }
    </script>

    <!-- Floating Bottom Center Controls & Virtual Keyboard Toggle -->
    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 z-20 flex flex-col items-center gap-3 pointer-events-auto">
        
        <!-- Virtual Keyboard Drawer -->
        <div id="virtualKeyboard" class="hidden glass-panel p-3 rounded-2xl shadow-2xl border border-white/15 max-w-xl w-full">
            <div class="flex items-center justify-between pb-2 mb-2 border-b border-white/10 text-xs text-gray-300 font-medium px-1">
                <span><i class="fa-solid fa-keyboard text-blue-400 mr-1.5"></i> 가상 키보드 (마인크래프트 조작용 WASD / 숫자 / 점프)</span>
                <span class="text-gray-500">버튼을 클릭하면 게임으로 키가 전달됩니다</span>
            </div>
            <div id="kbKeys"></div>
        </div>

        <!-- Main Toolbar -->
        <div class="glass-panel px-5 py-2.5 rounded-2xl flex items-center gap-5 shadow-2xl">
            <!-- View Presets -->
            <div class="flex items-center gap-2 text-xs text-gray-400 pr-4 border-r border-gray-700/50">
                <span class="font-medium mr-1">시점:</span>
                <button data-view="default" class="btn-view active bg-blue-600 text-white px-3 py-1.5 rounded-xl transition font-medium shadow-md shadow-blue-600/30">데스크전체</button>
                <button data-view="screen" class="btn-view bg-transparent hover:bg-gray-800/60 text-gray-400 hover:text-gray-200 px-3 py-1.5 rounded-xl transition font-medium">화면집중</button>
                <button data-view="pc" class="btn-view bg-transparent hover:bg-gray-800/60 text-gray-400 hover:text-gray-200 px-3 py-1.5 rounded-xl transition font-medium">PC본체</button>
            </div>

            <!-- RGB Lighting Theme Selector -->
            <div class="flex items-center gap-2.5 pr-4 border-r border-gray-700/50">
                <span class="text-xs text-gray-400 font-medium mr-1">조명:</span>
                <button data-theme="cyber" class="w-5 h-5 rounded-full bg-gradient-to-tr from-pink-500 to-cyan-400 ring-2 ring-white/20 hover:scale-110 transition shadow-md"></button>
                <button data-theme="neon" class="w-5 h-5 rounded-full bg-gradient-to-tr from-purple-600 to-blue-500 ring-2 ring-white/20 hover:scale-110 transition shadow-md"></button>
                <button data-theme="warm" class="w-5 h-5 rounded-full bg-gradient-to-tr from-amber-500 to-orange-400 ring-2 ring-white/20 hover:scale-110 transition shadow-md"></button>
                <button data-theme="dark" class="w-5 h-5 rounded-full bg-gradient-to-tr from-slate-700 to-slate-900 ring-2 ring-white/20 hover:scale-110 transition shadow-md"></button>
            </div>

            <!-- Toggle Screen Interact / Virtual Keyboard -->
            <div class="flex items-center gap-2">
                <button id="btnToggleKeyboard" class="glass-panel px-3 py-1.5 rounded-xl text-gray-300 hover:text-white text-xs font-medium transition flex items-center gap-1.5 hover:border-blue-500/50">
                    <i class="fa-solid fa-keyboard text-purple-400"></i>
                    <span>키보드</span>
                </button>
                <button id="btnToggleInteract" class="glass-panel px-3 py-1.5 rounded-xl text-gray-200 hover:text-white text-xs font-medium transition flex items-center gap-2 hover:border-blue-500/50">
                    <i class="fa-solid fa-computer-mouse text-blue-400"></i>
                    <span id="interactStatus">화면조작</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-6 right-6 z-30 glass-panel px-4 py-2.5 rounded-xl text-xs text-white opacity-0 transition-all duration-300 transform translate-y-[-10px] pointer-events-none flex items-center gap-2">
        <i class="fa-solid fa-circle-check text-blue-400"></i>
        <span id="toastMsg">메시지</span>
    </div>
</body>
</html>
